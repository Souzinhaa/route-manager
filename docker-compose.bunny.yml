services:
  # PostgreSQL Database (optimized for 2GB VPS)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: route_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d route_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - route_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
        reservations:
          memory: 64M

  # FastAPI + SPA (optimized for VPS)
  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/route_manager"
      SECRET_KEY: ${SECRET_KEY:-troque-em-producao-chave-forte-aqui}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      UPLOAD_DIR: /app/uploads
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      WEB_WORKERS: 2
    expose:
      - 8000
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - route_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 96M

  # Nginx Reverse Proxy (HTTP/HTTPS)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-bunny.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - route_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
  uploads_data:
  nginx_cache:

networks:
  route_net:
